name: Package offline wheels

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - requirements.txt
      - .github/workflows/package-offline-wheels.yml
      - install_offline.bat
      - start_pxn_reader.bat
      - app.py
      - narrative_sheet/**
      - pyproject.toml

jobs:
  package:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Download wheels
        run: "python -m pip download -r requirements.txt -d offline_wheels --only-binary=:all:"

      - name: Verify numpy wheel exists
        shell: pwsh
        run: |
          Get-ChildItem offline_wheels
          $numpy = Get-ChildItem offline_wheels -Filter "numpy*.whl"
          if (-not $numpy) {
            Write-Error "numpy wheel was not downloaded"
            exit 1
          }

      - name: Upload offline package
        uses: actions/upload-artifact@v4
        with:
          name: pxn-reader-offline-windows-python311
          path: |
            app.py
            narrative_sheet/**
            content/**
            example/**
            requirements.txt
            pyproject.toml
            README.md
            offline_wheels/**
            install_offline.bat
            start_pxn_reader.bat
